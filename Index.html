<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Walzade | Embedded Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  padding: 20px;
}

/* Card */
.container {
  max-width: 400px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: fadeIn 1s ease;
}

/* Profile Image */
.profile-img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #00c6ff;
  box-shadow: 0 0 25px #00c6ff;
  margin-bottom: 15px;
}

/* Name */
h1 {
  font-size: 24px;
  margin-bottom: 5px;
}

/* Subtitle */
.subtitle {
  color: #00c6ff;
  font-size: 14px;
  margin-bottom: 10px;
}

/* Skills */
.skills {
  font-size: 12px;
  color: #ccc;
  margin-bottom: 20px;
}

/* Buttons */
.button {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px #00c6ff;
}

/* Footer */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}

/* Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

  <!-- Profile Photo -->
  <img src="profile.jpg" class="profile-img" alt="Aditya Walzade">

  <!-- Name -->
  <h1>Aditya Walzade</h1>

  <!-- Role -->
  <div class="subtitle">Embedded Systems Engineer 🚀</div>

  <!-- Skills -->
  <div class="skills">
    IoT | Raspberry Pi | Arduino | LoRa | Firmware Development
  </div>

  <!-- Buttons -->
  <button class="button" onclick="call()">📞 Call Me</button>
  <button class="button" onclick="whatsapp()">💬 WhatsApp</button>
  <button class="button" onclick="email()">📧 Email</button>
  <button class="button" onclick="linkedin()">💼 LinkedIn</button>
  <button class="button" onclick="instagram()">📸 Instagram</button>
  <button class="button" onclick="portfolio()">🌐 Portfolio</button>
  <button class="button" onclick="saveContact()">📇 Save Contact</button>

  <!-- Footer -->
  <div class="footer">
    Powered by TapX ⚡
  </div>

</div>

<script>
function call() {
  window.location.href = "tel:+917776067841";
}

function whatsapp() {
  window.open("https://wa.me/917776067841");
}

function email() {
  window.location.href = "mailto:adityawalzade203@gmail.com";
}

function linkedin() {
  window.open("https://www.linkedin.com/in/adityawalzade");
}

function instagram() {
  window.open("https://instagram.com/adityaw007");
}

function portfolio() {
  alert("Add your portfolio link here 🚀");
}

// Save Contact
function saveContact() {
  const vcard = `
BEGIN:VCARD
VERSION:3.0
FN:Aditya Walzade
TITLE:Embedded Engineer
TEL:+917776067841
EMAIL:adityawalzade203@gmail.com
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Aditya_Walzade.vcf";
  link.click();
}
</script>

</body>
</html>
