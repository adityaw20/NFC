<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Walzade | TapX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* Main Card */
.card {
  width: 100%;
  max-width: 380px;
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

/* Profile */
.profile-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
}

h1 {
  font-size: 22px;
  margin-bottom: 5px;
}

.subtitle {
  color: #0072ff;
  font-size: 14px;
  margin-bottom: 10px;
}

.skills {
  font-size: 13px;
  color: #666;
  margin-bottom: 20px;
}

/* Buttons */
.button {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: #0072ff;
  color: white;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  background: #005ad6;
}

/* Save Contact Special */
.save {
  background: #111;
}

.save:hover {
  background: #333;
}

/* Footer */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #999;
}

/* Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(15px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="card">

  <img src="profile.jpg" class="profile-img">

  <h1>Aditya Walzade</h1>
  <div class="subtitle">Embedded Systems Engineer</div>

  <div class="skills">
    IoT • Raspberry Pi • Arduino • LoRa • Firmware
  </div>

  <button class="button" onclick="call()">📞 Call</button>
  <button class="button" onclick="whatsapp()">💬 WhatsApp</button>
  <button class="button" onclick="email()">📧 Email</button>
  <button class="button" onclick="linkedin()">💼 LinkedIn</button>
  <button class="button" onclick="instagram()">📸 Instagram</button>

  <button class="button save" onclick="saveContact()">📇 Save Contact</button>

  <div class="footer">
    TapX Digital Card ⚡
  </div>

</div>

<script>
function call() {
  window.location.href = "tel:+917776067841";
}

function whatsapp() {
  window.open("https://wa.me/917776067841");
}

function email() {
  window.location.href = "mailto:adityawalzade203@gmail.com";
}

function linkedin() {
  window.open("https://www.linkedin.com/in/adityawalzade");
}

function instagram() {
  window.open("https://instagram.com/adityaw007");
}

function saveContact() {
  const vcard = `
BEGIN:VCARD
VERSION:3.0
FN:Aditya Walzade
TITLE:Embedded Engineer
TEL:+917776067841
EMAIL:adityawalzade203@gmail.com
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Aditya.vcf";
  link.click();
}
</script>

</body>
</html>
