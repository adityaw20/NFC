<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Walzade | TapX Neo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00f2ff;
  --secondary: #7000ff;
  --bg-dark: #0a0a12;
  --glass: rgba(255, 255, 255, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-dark);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  /* Animated Gradient Background */
  background: linear-gradient(-45deg, #0a0a12, #1a1a2e, #16213e, #0f3460);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Main Anime Card */
.card {
  width: 90%;
  max-width: 360px;
  background: var(--glass);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-radius: 30px;
  padding: 30px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: cardEntrance 1s cubic-bezier(0.23, 1, 0.32, 1);
}

@keyframes cardEntrance {
  from { opacity: 0; transform: scale(0.8) translateY(50px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Profile Image with Glow */
.profile-img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  object-fit: cover;
  margin-bottom: 15px;
  box-shadow: 0 0 20px var(--primary);
  transition: 0.5s;
}

.profile-img:hover {
  transform: rotate(5deg) scale(1.1);
  box-shadow: 0 0 40px var(--primary);
}

h1 {
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  font-size: 24px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
  text-shadow: 0 0 10px var(--primary);
}

.subtitle {
  color: var(--primary);
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 15px;
  letter-spacing: 1px;
}

.skills {
  font-size: 11px;
  color: #ccc;
  background: rgba(0, 0, 0, 0.3);
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 25px;
  border-left: 3px solid var(--secondary);
}

/* Cyberpunk Buttons */
.button {
  position: relative;
  display: block;
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 5px;
  border: 1px solid var(--primary);
  background: transparent;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.4s;
  overflow: hidden;
  text-transform: uppercase;
}

.button:hover {
  background: var(--primary);
  color: #000;
  box-shadow: 0 0 25px var(--primary);
}

/* Special Button */
.save {
  border-color: var(--secondary);
  background: rgba(112, 0, 255, 0.2);
}

.save:hover {
  background: var(--secondary);
  box-shadow: 0 0 25px var(--secondary);
}

.footer {
  margin-top: 25px;
  font-size: 10px;
  color: #888;
  letter-spacing: 2px;
}

/* Scanline Effect - Makes it look like a screen */
.card::before {
  content: " ";
  position: absolute;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  background-size: 100% 4px, 3px 100%;
  pointer-events: none;
  z-index: 2;
}

</style>
</head>
<body>

<div class="card">
  <img src="profile.jpg" class="profile-img" alt="Aditya">

  <h1>Aditya Walzade</h1>
  <div class="subtitle">Embedded Systems Engineer</div>

  <div class="skills">
    SYSTEM_INIT: IoT • RPi • Arduino • LoRa • Firmware
  </div>

  <button class="button" onclick="call()">⚡ Call</button>
  <button class="button" onclick="whatsapp()">💬 WhatsApp</button>
  <button class="button" onclick="email()">📧 Email</button>
  <button class="button" onclick="linkedin()">💼 LinkedIn</button>
  <button class="button save" onclick="saveContact()">📇 Sync Data</button>

  <div class="footer">
    [ SYSTEM ONLINE ] — TAPX OS
  </div>
</div>

<script>
// Logic remains the same as your original script
function call() { window.location.href = "tel:+917776067841"; }
function whatsapp() { window.open("https://wa.me/917776067841"); }
function email() { window.location.href = "mailto:adityawalzade203@gmail.com"; }
function linkedin() { window.open("https://www.linkedin.com/in/adityawalzade"); }

function saveContact() {
  const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Aditya Walzade
TITLE:Embedded Engineer
TEL:+917776067841
EMAIL:adityawalzade203@gmail.com
END:VCARD`;
  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Aditya_Neo.vcf";
  link.click();
}
</script>

</body>
</html>
