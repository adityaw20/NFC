<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Walzade | Embedded Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0a0f1f, #000);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 380px;
  margin: auto;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(0, 102, 255, 0.3);
}

.profile-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: bold;
  margin: auto;
}

h1 {
  font-family: 'Orbitron', sans-serif;
  margin: 10px 0 5px;
}

p {
  color: #aaa;
  font-size: 14px;
}

.button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #0066ff, #00c6ff);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00c6ff;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile-img">AW</div>

  <h1>Aditya Walzade</h1>
  <p>Embedded Systems Engineer 🚀</p>

  <p>
    IoT | Raspberry Pi | Arduino | LoRa | Firmware Development  
  </p>

  <button class="button" onclick="call()">📞 Call Me</button>
  <button class="button" onclick="whatsapp()">💬 WhatsApp</button>
  <button class="button" onclick="email()">📧 Email</button>
  <button class="button" onclick="linkedin()">💼 LinkedIn</button>
  <button class="button" onclick="portfolio()">🌐 Portfolio</button>

  <button class="button" onclick="saveContact()">📇 Save Contact</button>

  <div class="footer">
    Powered by TapX ⚡
  </div>

</div>

<script>
function call() {
  window.location.href = "tel:+919876543210";
}

function whatsapp() {
  window.open("https://wa.me/919876543210");
}

function email() {
  window.location.href = "mailto:aditya@email.com";
}

function linkedin() {
  window.open("https://linkedin.com/in/aditya");
}

function portfolio() {
  window.open("https://yourportfolio.com");
}

// Save Contact (VCF)
function saveContact() {
  const vcard = `
BEGIN:VCARD
VERSION:3.0
FN:Aditya Walzade
TITLE:Embedded Engineer
TEL:+919876543210
EMAIL:aditya@email.com
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Aditya.vcf";
  link.click();
}
</script>

</body>
</html>
